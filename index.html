<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="React 기반 개인 가계부 MyWallet" />
    <title>MyWallet</title>
  </head>
  <body>
    <div id="root">
      <main style="min-height:100vh;display:grid;place-items:center;background:#f3f5f8;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <section style="width:min(520px,calc(100% - 32px));padding:32px;border-radius:24px;background:#fff;box-shadow:0 24px 70px rgba(15,23,42,.08);">
          <p style="margin:0 0 8px;color:#0f5f78;font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:12px;">MyWallet</p>
          <h1 style="margin:0 0 12px;font-size:32px;letter-spacing:-.04em;">가계부를 불러오는 중입니다.</h1>
          <p style="margin:0;color:#667085;line-height:1.6;">이 문구만 계속 보이면 React 번들 로딩 또는 Cloudflare 배포 설정을 확인해야 합니다.</p>
        </section>
      </main>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;background:#fef2f2;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;"><section style="width:min(720px,calc(100% - 32px));padding:32px;border-radius:24px;background:#fff;box-shadow:0 24px 70px rgba(15,23,42,.08);"><p style="margin:0 0 8px;color:#b42318;font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:12px;">Runtime Error</p><h1 style="margin:0 0 12px;font-size:28px;letter-spacing:-.04em;">앱 실행 중 오류가 발생했습니다.</h1><pre style="white-space:pre-wrap;line-height:1.5;color:#b42318;">' + String(event.message || 'Unknown error') + '</pre></section></main>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
