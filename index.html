<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="React 기반 개인 가계부 MyWallet" />
    <meta name="theme-color" content="#172033" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MyWallet" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>MyWallet</title>
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes logoPulse {
          0%, 100% { opacity: 0.75; filter: drop-shadow(0 0 4px rgba(11, 142, 199, 0.15)); }
          50% { opacity: 1; filter: drop-shadow(0 0 24px rgba(11, 142, 199, 0.55)); }
        }
        @keyframes progressFill {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
      </style>
      <main style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at center, #0f172a 0%, #030712 100%);color:#ffffff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;gap:24px;box-sizing:border-box;margin:0;">
        <div style="width:110px;height:110px;animation:logoPulse 2s infinite ease-in-out;display:flex;align-items:center;justify-content:center;">
          <img src="/logo.png" alt="MyWallet 로고" style="width:100%;height:100%;object-fit:contain;" />
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;">
          <h1 style="margin:0;font-size:1.9rem;font-weight:900;letter-spacing:-0.03em;color:#ffffff;">
            <span>My</span><span style="color:#0ea5e9;">Wallet</span>
          </h1>
        </div>
        <div style="width:220px;height:4px;background:rgba(255, 255, 255, 0.1);border-radius:10px;overflow:hidden;margin-top:12px;position:relative;">
          <div style="width:100%;height:100%;background:linear-gradient(90deg, #0ea5e9 0%, #22d3ee 100%);border-radius:10px;animation:progressFill 2s infinite linear;position:absolute;left:0;top:0;" />
        </div>
      </main>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;background:#fef2f2;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;"><section style="width:min(720px,calc(100% - 32px));padding:32px;border-radius:24px;background:#fff;box-shadow:0 24px 70px rgba(15,23,42,.08);"><p style="margin:0 0 8px;color:#b42318;font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:12px;">Runtime Error</p><h1 style="margin:0 0 12px;font-size:28px;letter-spacing:-.04em;">앱 실행 중 오류가 발생했습니다.</h1><pre style="white-space:pre-wrap;line-height:1.5;color:#b42318;">' + String(event.message || 'Unknown error') + '</pre></section></main>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
