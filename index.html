<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="React 기반 개인 가계부 MyWallet" />
    <meta name="theme-color" content="#172033" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="MyWallet" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>MyWallet</title>
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes logoPulse {
          0%, 100% { opacity: 0.75; filter: drop-shadow(0 0 4px rgba(11, 142, 199, 0.15)); }
          50% { opacity: 1; filter: drop-shadow(0 0 24px rgba(11, 142, 199, 0.55)); }
        }
        @keyframes progressFill {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
        }
      </style>
      <main style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(circle at center, #0f172a 0%, #030712 100%);color:#ffffff;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;gap:24px;box-sizing:border-box;margin:0;">
        <div style="width:110px;height:110px;animation:logoPulse 2s infinite ease-in-out;">
          <svg style="width:100%;height:100%;" viewBox="0 0 64 64" role="img" aria-label="MyWallet 로고" focusable="false">
            <defs>
              <linearGradient id="mw-wallet-gradient-html" x1="8" y1="8" x2="56" y2="58" gradientUnits="userSpaceOnUse">
                <stop stop-color="#38bdf8" />
                <stop offset="0.5" stop-color="#0ea5e9" />
                <stop offset="1" stop-color="#0284c7" />
              </linearGradient>
              <linearGradient id="mw-cyan-gradient-html" x1="20" y1="36" x2="43" y2="55" gradientUnits="userSpaceOnUse">
                <stop stop-color="#67e8f9" />
                <stop offset="1" stop-color="#22d3ee" />
              </linearGradient>
            </defs>
            <rect x="7" y="16" width="49" height="41" rx="14" fill="url(#mw-wallet-gradient-html)" />
            <path d="M18 17c1.8-6 6.4-8.8 13.6-8.8H44c2.6 0 4.7 2.1 4.7 4.7V17H18Z" fill="#475569" />
            <path d="M20.5 16c1.9-3.2 5.1-4.7 10.2-4.7H43c1 0 1.8.8 1.8 1.8V16H20.5Z" fill="#cbd5e1" opacity="0.95" />
            <path d="M17.5 14.5c-3.8 0-7 3.1-7 7v2.2h10.8" fill="none" stroke="#38bdf8" stroke-width="4.6" stroke-linecap="round" />
            <path d="M26.5 8.5v7M34 8.5v7M41.5 8.5v7" stroke="#22d3ee" stroke-width="4.3" stroke-linecap="round" />
            <path d="M45 30h10c3.3 0 6 2.7 6 6v6c0 3.3-2.7 6-6 6H45c-5 0-9-4-9-9s4-9 9-9Z" fill="#0f172a" />
            <path d="M46 34h8.2c1.5 0 2.8 1.2 2.8 2.8v4.4c0 1.5-1.2 2.8-2.8 2.8H46c-2.8 0-5-2.2-5-5s2.2-5 5-5Z" fill="#1e3a8a" />
            <circle cx="50.5" cy="39" r="2.8" fill="#bfdbfe" />
            <path d="M14.3 43.8V27h5.7l5.4 8.1 5.4-8.1h5.7v16.8h-5.8v-8.4l-4.2 6.1h-2.2l-4.2-6.1v8.4h-5.8Z" fill="#ffffff" />
            <path d="M21.5 50.5 17.6 36.7h5.2l1.6 7.2 2.3-7.2h4l2.3 7.2 1.6-7.2h5.2l-3.9 13.8h-5.2l-2-6.2-2 6.2h-5.2Z" fill="url(#mw-cyan-gradient-html)" />
          </svg>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;">
          <h1 style="margin:0;font-size:1.9rem;font-weight:900;letter-spacing:-0.03em;color:#ffffff;">
            <span>My</span><span style="color:#0ea5e9;">Wallet</span>
          </h1>
        </div>
        <div style="width:220px;height:4px;background:rgba(255, 255, 255, 0.1);border-radius:10px;overflow:hidden;margin-top:12px;position:relative;">
          <div style="width:100%;height:100%;background:linear-gradient(90deg, #0ea5e9 0%, #22d3ee 100%);border-radius:10px;animation:progressFill 2s infinite linear;position:absolute;left:0;top:0;" />
        </div>
      </main>
    </div>
    <script>
      window.addEventListener('error', function (event) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;background:#fef2f2;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;"><section style="width:min(720px,calc(100% - 32px));padding:32px;border-radius:24px;background:#fff;box-shadow:0 24px 70px rgba(15,23,42,.08);"><p style="margin:0 0 8px;color:#b42318;font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:12px;">Runtime Error</p><h1 style="margin:0 0 12px;font-size:28px;letter-spacing:-.04em;">앱 실행 중 오류가 발생했습니다.</h1><pre style="white-space:pre-wrap;line-height:1.5;color:#b42318;">' + String(event.message || 'Unknown error') + '</pre></section></main>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
